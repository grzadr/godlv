<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="yt-dlp background task manager">
    <title>yt-dlp Manager</title>
    <script src="https://unpkg.com/htmx.org@1.9.11"></script>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>
    <h1>yt-dlp Manager</h1>
    <form hx-post="/download" hx-target="#status" hx-swap="innerHTML">
        <input type="url" name="url" placeholder="Enter video URL" required>
        <button type="submit">Submit</button>
    </form>
    <div id="status"></div>
</body>

</html>
