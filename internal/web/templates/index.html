<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="yt-dlp background task manager">
    <title>yt-dlp Manager</title>
    <script src="https://cdn.jsdelivr.net/npm/htmx.org@2.0.10/dist/htmx.min.js"
        integrity="sha384-H5SrcfygHmAuTDZphMHqBJLc3FhssKjG7w/CeCpFReSfwBWDTKpkzPP8c+cLsK+V" crossorigin="anonymous"
        defer></script>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>
    <main>
        <h1>yt-dlp Manager</h1>
        <form hx-post="/download" hx-target="#status" hx-swap="innerHTML">
            <input type="url" name="url" placeholder="Enter video URL" required>
            <button type="submit">Submit</button>
        </form>
        <div id="status"></div>
    </main>
</body>

</html>
